name: quickscanner
description: "QuickScanner AI — privacy-first PDF document scanner (local OCR & encryption)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  pdf: ^3.11.1
  path_provider: ^2.1.4
  share_plus: ^10.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.3
  image: ^4.5.4
  google_mlkit_text_recognition: ^0.15.0
  crypto: ^3.0.6
  flutter_secure_storage: ^10.2.0
  local_auth: ^3.0.1
  cryptography: ^2.9.0
  archive: ^4.0.9
  purchases_flutter: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
